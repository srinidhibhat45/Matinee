name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: npm ci

      - name: Build on EAS
        run: |
          npx eas-cli build --platform android --profile preview --non-interactive

      - name: Fetch and Download APK
        run: |
          # Fetch the URL of the last successfully completed build
          DOWNLOAD_URL=$(npx eas-cli build:list --platform android --profile preview --status finished --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          if [ "$DOWNLOAD_URL" = "null" ] || [ -z "$DOWNLOAD_URL" ]; then
            echo "Error: Failed to fetch APK download URL from EAS"
            exit 1
          fi
          echo "Downloading APK from: $DOWNLOAD_URL"
          curl -L -o matinee-app.apk "$DOWNLOAD_URL"

      - name: Upload APK as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matinee-android-apk
          path: matinee-app.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: matinee-app.apk
          name: Release ${{ github.ref_name }}
          body: |
            Automatic build generated for tag ${{ github.ref_name }}.
            
            ### Download APK
            - [matinee-app.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/matinee-app.apk)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
